name: Compile LaTeX

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Lisyanskaya_resume.tex

      - name: Commit PDF
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Lisyanskaya_resume.pdf || true
          git commit -m "Update PDF" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/kurabier/Lisyanskaya_resume.git || true
